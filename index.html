<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة الكابتن - يلا نروح</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .order-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; }
        #map { height: 250px; border-radius: 15px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; margin-top: 10px; }
        #chatBox { background: #fff; padding: 15px; border-radius: 15px; margin-top: 10px; border: 1px solid #e2e8f0; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>لوحة التحكم 🛵</h2>
        <div id="ordersList">جاري تحميل الطلبات...</div>
    </div>

    <script>
        const supabase = supabase.createClient('URL', 'KEY');

        async function fetchOrders() {
            // 1. فحص هل الكابتن مشغول بطلب؟
            const { data: active } = await supabase.from('deliveries')
                .select('*').eq('captain_phone', localStorage.getItem('captain_phone'))
                .eq('status', 'تم القبول من المندوب').single();

            const list = document.getElementById('ordersList');

            if (active) {
                // الكابتن مشغول: عرض الطلب + الخريطة + المحادثة
                list.innerHTML = `
                    <div class="order-card">
                        <h3>طلب نشط: ${active.client_name}</h3>
                        <div id="map"></div>
                        <div id="chatBox" style="display:block;">
                            <div id="messages" style="height:150px; overflow-y:scroll; background:#f1f5f9; padding:10px; border-radius:10px;"></div>
                            <input type="text" id="msgInput" style="width:70%; padding:8px;">
                            <button onclick="sendMessage(${active.id})">إرسال</button>
                        </div>
                        <button class="btn" style="background:#dc2626" onclick="finishOrder(${active.id})">✅ تم التسليم</button>
                    </div>`;
                // هنا تشغيل كود الخريطة (Leaflet)
                // ...
            } else {
                // الكابتن متاح: عرض الطلبات المتاحة فقط
                const { data } = await supabase.from('deliveries').select('*').eq('status', 'قيد الانتظار');
                list.innerHTML = data.map(o => `
                    <div class="order-card">
                        <p>الزبون: ${o.client_name}</p>
                        <button class="btn" style="background:#4f46e5" onclick="acceptOrder(${o.id})">قبول الطلب</button>
                    </div>`).join('');
            }
        }
        
        // بقية الدوال (acceptOrder, finishOrder, sendMessage) تبقى كما هي.
        fetchOrders();
    </script>
</body>
</html>
