<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الكابتن - يلا نروح</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; direction: rtl; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; padding: 15px 0; background: #059669; color: white; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(5, 150, 105, 0.2); }
        .header h2 { margin: 0; font-size: 20px; font-weight: 700; }
        .order-card { background: white; padding: 15px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 15px; border: 1px solid #e2e8f0; position: relative; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 8px; }
        .price-badge { background: #fee2e2; color: #dc2626; font-weight: 700; padding: 4px 12px; border-radius: 20px; font-size: 15px; }
        .distance-badge { background: #e0f2fe; color: #0369a1; font-weight: 600; padding: 4px 12px; border-radius: 20px; font-size: 13px; }
        .detail-item { font-size: 14px; color: #1e293b; margin: 8px 0; }
        .detail-item strong { color: #475569; }
        
        /* تصميم الخريطة المصغرة داخل كارد المندوب */
        .order-map { height: 160px; border-radius: 12px; margin: 12px 0; border: 1.5px solid #e2e8f0; z-index: 1; }
        
        .accept-btn { width: 100%; padding: 12px; background: #059669; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: 'Cairo'; margin-top: 5px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .accept-btn:hover { background: #047857; }
        .accept-btn.loading { background: #9ca3af; cursor: not-allowed; }
        .accept-btn.done { background: #10b981; cursor: not-allowed; }
        .no-orders { text-align: center; color: #64748b; font-size: 15px; margin-top: 60px; }
        .nav-hint { text-align: center; font-size: 11px; color: #64748b; margin-top: -5px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>الطلبات النشطة بالرمادي 🚗</h2>
        </div>
        <div id="ordersList">
            <p class="no-orders">جاري مراقبة الشوارع والطلبات...</p>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://swblfuyivvsrjulztyff.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3YmxmdXlpdnZzcmp1bHp0eWZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0OTQ4NTMsImV4cCI6MjA5NjA3MDg1M30.B_2lxLiEdIWSUGPlLblmi6ob8zBBAIwiOjl1Yb6RhLs';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // دالة تحويل إحداثيات النص إلى مصفوفة أرقام [lat, lng]
        function parseCoords(locationStr) {
            const clean = locationStr.replace('إحداثيات:', '').trim();
            const parts = clean.split(',');
            return [parseFloat(parts[0]), parseFloat(parts[1])];
        }

        async function fetchOrders() {
            const { data: orders, error } = await supabaseClient
                .from('deliveries')
                .select('*')
                .eq('status', 'قيد الانتظار')
                .order('id', { ascending: false });

            const container = document.getElementById('ordersList');
            if (error) { container.innerHTML = '<p class="no-orders" style="color:red;">مشكلة بالاتصال بالسيرفر</p>'; return; }
            if (!orders || orders.length === 0) { container.innerHTML = '<p class="no-orders">لا توجد طلبات جديدة حالياً.. استرح قليلاً ☕</p>'; return; }

            container.innerHTML = '';
            
            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = 'order-card';
                card.id = `card-${order.id}`;
                
                // تجهيز معرف فريد لكل خريطة داخل الكروت
                const mapId = `map-${order.id}`;

                card.innerHTML = `
                    <div class="card-header">
                        <span class="distance-badge">🛣️ ${order.distance || '0'} كم</span>
                        <span class="price-badge">${(order.price || 0).toLocaleString()} د.ع</span>
                    </div>
                    <div class="detail-item"><strong>📦 الغرض:</strong> <span>${order.item_details}</span></div>
                    
                    <div id="${mapId}" class="order-map"></div>
                    <div class="nav-hint">💡 تكدر تحرك الخريطة وتكبر وتصغر لتشوف المسار كامل</div>

                    <button class="accept-btn" id="btn-${order.id}" onclick="acceptOrder(${order.id})">
                        ⚡ قبول واستلام الطلب
                    </button>
                `;
                container.appendChild(card);

                // رسم الخريطة للطلب بشكل مستقل تلقائياً
                try {
                    const pickup = parseCoords(order.pickup_location);
                    const dropoff = parseCoords(order.dropoff_location);

                    // إنشاء الخريطة وتوسيطها بين النقطتين
                    const cardMap = L.map(mapId, {zoomControl: false}).setView([ (pickup[0]+dropoff[0])/2, (pickup[1]+dropoff[1])/2 ], 13);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(cardMap);

                    // إضافة ماركر الاستلام (الأزرق الافتراضي) وماركر التسليم (الأحمر المخصص)
                    L.marker(pickup).addTo(cardMap).bindPopup("📍 مكان الاستلام");
                    L.marker(dropoff).addTo(cardMap).bindPopup("🏁 مكان التسليم");

                    // رسم خط مباشر (Polyline) يربط منين لي وين بلون أحمر احترافي
                    L.polyline([pickup, dropoff], {color: '#dc2626', weight: 4, dashArray: '5, 10'}).addTo(cardMap);
                    
                    // احتواء النقطتين داخل مساحة الرؤية تلقائياً
                    cardMap.fitBounds([pickup, dropoff], { padding: [20, 20] });
                } catch(e) {
                    document.getElementById(mapId).innerHTML = "<p style='text-align:center; padding-top:60px; color:#64748b;'>تعذر تحميل مسار الخريطة لهذا الطلب القديم</p>";
                }
            });
        }

        async function acceptOrder(orderId) {
            const btn = document.getElementById(`btn-${orderId}`);
            btn.className = "accept-btn loading";
            btn.innerText = "جاري الحجز...";
            btn.disabled = true;

            const { error } = await supabaseClient
                .from('deliveries')
                .update({ status: 'تم القبول من المندوب' })
                .eq('id', orderId);

            if (error) {
                btn.className = "accept-btn";
                btn.innerText = "⚡ فشل الحجز، حاول مجدداً";
                btn.disabled = false;
            } else {
                btn.className = "accept-btn done";
                btn.innerText = "تم قبول الطلب بنجاح! ✅";
                setTimeout(() => {
                    const card = document.getElementById(`card-${orderId}`);
                    if(card) card.style.display = 'none';
                    fetchOrders();
                }, 1500);
            }
        }

        fetchOrders();
        // جعل التحديث كل 15 ثانية لتفادي إعادة تحميل الخرائط بشكل يزعج العين أثناء تصفح المندوب
        setInterval(fetchOrders, 15000);
    </script>
</body>
</html>
