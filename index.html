<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المندوب - يلا نروح</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Cairo',sans-serif;background:#0b1120;color:#e2e8f0;direction:rtl;min-height:100vh;}

        /* ===== شاشة الدخول ===== */
        #loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
        .login-card{background:#1e293b;border:1px solid #334155;border-radius:24px;padding:30px 24px;width:100%;max-width:400px;}
        .login-card h2{text-align:center;color:#818cf8;font-size:22px;font-weight:800;margin-bottom:6px;}
        .login-card p{text-align:center;color:#64748b;font-size:13px;margin-bottom:24px;}
        .inp-group{margin-bottom:14px;}
        .inp-group label{font-size:12px;color:#94a3b8;font-weight:600;display:block;margin-bottom:5px;}
        .inp-group input{width:100%;padding:12px 14px;background:#0f172a;border:1.5px solid #334155;border-radius:12px;color:#f1f5f9;font-family:'Cairo';font-size:14px;outline:none;transition:border .2s;}
        .inp-group input:focus{border-color:#6366f1;}
        .btn-login{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Cairo';margin-top:8px;letter-spacing:.5px;}

        /* ===== لوحة المندوب ===== */
        #dashScreen{display:none;padding:16px;max-width:480px;margin:0 auto;}
        .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding:14px 18px;background:#1e293b;border-radius:16px;border:1px solid #334155;}
        .top-bar .cap-name{font-weight:700;font-size:15px;color:#a5b4fc;}
        .top-bar .status-pill{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:700;}
        .status-pill.free{background:#d1fae5;color:#065f46;}
        .status-pill.busy{background:#fee2e2;color:#991b1b;}
        .section-title{font-size:14px;color:#64748b;font-weight:700;margin-bottom:12px;padding-right:4px;}

        /* ===== كارد الطلب ===== */
        .order-card{background:#1e293b;border:1px solid #334155;border-radius:18px;padding:18px;margin-bottom:14px;transition:border .2s;}
        .order-card.my-order{border-color:#6366f1;box-shadow:0 0 0 1px #6366f133;}
        .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
        .card-id{font-weight:800;color:#a5b4fc;font-size:15px;}
        .badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;}
        .badge.waiting{background:#fef3c7;color:#92400e;}
        .badge.accepted{background:#d1fae5;color:#065f46;}
        .badge.done{background:#e0e7ff;color:#3730a3;}

        /* خريطة الطلب */
        .map-preview{height:180px;border-radius:12px;margin-bottom:14px;border:1px solid #334155;overflow:hidden;position:relative;}
        .map-actions{display:flex;gap:8px;margin-bottom:14px;}
        .map-btn{flex:1;padding:10px;border:none;border-radius:10px;font-family:'Cairo';font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
        .map-btn.pickup{background:#0ea5e9;color:white;}
        .map-btn.dropoff{background:#f59e0b;color:white;}
        .map-btn.route{background:#8b5cf6;color:white;}

        .info-row{display:flex;gap:8px;margin-bottom:14px;}
        .info-chip{flex:1;background:#0f172a;border-radius:10px;padding:10px 12px;text-align:center;}
        .info-chip .lbl{font-size:11px;color:#64748b;display:block;margin-bottom:2px;}
        .info-chip .val{font-size:14px;font-weight:700;color:#f1f5f9;}

        .detail-row{font-size:13px;color:#94a3b8;margin-bottom:6px;line-height:1.6;}
        .detail-row strong{color:#e2e8f0;}

        .btn-accept{width:100%;padding:13px;background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Cairo';margin-bottom:10px;}
        .btn-delivered{width:100%;padding:13px;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Cairo';margin-bottom:10px;}
        button:disabled{opacity:.5;cursor:not-allowed;}

        /* ===== المحادثة ===== */
        .chat-box{border:1px solid #334155;border-radius:14px;overflow:hidden;margin-top:4px;}
        .chat-hdr{background:#312e81;padding:10px 14px;font-weight:700;font-size:13px;color:#c7d2fe;display:flex;align-items:center;gap:8px;}
        .live-dot{width:8px;height:8px;background:#4ade80;border-radius:50%;animation:blink 1.4s infinite;}
        @keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
        .chat-msgs{height:190px;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;background:#0b1120;}
        .msg{max-width:78%;padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word;}
        .msg.me{background:#6366f1;color:white;align-self:flex-start;border-bottom-right-radius:3px;}
        .msg.them{background:#1e293b;color:#e2e8f0;align-self:flex-end;border:1px solid #334155;border-bottom-left-radius:3px;}
        .msg .t{font-size:10px;opacity:.6;margin-top:3px;}
        .chat-footer{display:flex;gap:8px;padding:10px;border-top:1px solid #334155;background:#1e293b;}
        .chat-footer input{flex:1;padding:9px 13px;background:#0f172a;border:1.5px solid #334155;border-radius:20px;color:#f1f5f9;font-family:'Cairo';font-size:13px;outline:none;}
        .chat-footer input:focus{border-color:#6366f1;}
        .send-btn{padding:9px 14px;background:#6366f1;border:none;border-radius:20px;color:white;font-size:18px;cursor:pointer;flex-shrink:0;}

        #noOrders{text-align:center;color:#475569;padding:40px 20px;font-size:14px;}
        .empty-icon{font-size:40px;display:block;margin-bottom:10px;}
    </style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginScreen">
    <div class="login-card">
        <h2>🏍️ يلا نروح</h2>
        <p>لوحة تحكم المندوب</p>
        <div class="inp-group"><label>اسمك</label><input type="text" id="capName" placeholder="اسم المندوب"></div>
        <div class="inp-group"><label>رقم هاتفك</label><input type="tel" id="capPhone" placeholder="07XXXXXXXXX"></div>
        <div class="inp-group"><label>نوع دراجتك</label><input type="text" id="capBike" placeholder="مثال: هوندا 125"></div>
        <button class="btn-login" onclick="saveCaptainLogin()">دخول لوحة المناديب ⚡</button>
    </div>
</div>

<!-- لوحة المندوب -->
<div id="dashScreen">
    <div class="top-bar">
        <div>
            <div class="cap-name" id="topCapName">المندوب</div>
            <div style="font-size:12px;color:#64748b;" id="topCapPhone"></div>
        </div>
        <span class="status-pill free" id="capStatusPill">🟢 متاح</span>
    </div>
    <div class="section-title">📋 الطلبات المتاحة</div>
    <div id="ordersList"><div id="noOrders"><span class="empty-icon">📭</span>جاري تحميل الطلبات...</div></div>
</div>

<script>
const supabaseUrl='https://swblfuyivvsrjulztyff.supabase.co';
const supabaseKey='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3YmxmdXlpdnZzcmp1bHp0eWZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0OTQ4NTMsImV4cCI6MjA5NjA3MDg1M30.B_2lxLiEdIWSUGPlLblmi6ob8zBBAIwiOjl1Yb6RhLs';
const sc=supabase.createClient(supabaseUrl,supabaseKey);

let capName,capPhone,capBike;
let isBusy=false;
let maps={},chatChannels={},shownMsgIds={};

window.onload=function(){
    if(localStorage.getItem('cap_logged')==='true'){
        capName=localStorage.getItem('cap_name');
        capPhone=localStorage.getItem('cap_phone');
        capBike=localStorage.getItem('cap_bike');
        showDashboard();
    }
}

function saveCaptainLogin(){
    capName=document.getElementById('capName').value.trim();
    capPhone=document.getElementById('capPhone').value.trim();
    capBike=document.getElementById('capBike').value.trim();
    if(!capName||!capPhone){alert("الرجاء إكمال البيانات!");return;}
    localStorage.setItem('cap_name',capName);
    localStorage.setItem('cap_phone',capPhone);
    localStorage.setItem('cap_bike',capBike);
    localStorage.setItem('cap_logged','true');
    showDashboard();
}

function showDashboard(){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashScreen').style.display='block';
    document.getElementById('topCapName').innerText='👤 '+capName;
    document.getElementById('topCapPhone').innerText=capPhone;
    loadOrders();
    sc.channel('orders-live-1').on('postgres_changes',{event:'INSERT',schema:'public',table:'deliveries'},loadOrders).subscribe();
    sc.channel('orders-live-2').on('postgres_changes',{event:'UPDATE',schema:'public',table:'deliveries'},loadOrders).subscribe();
}

// استخراج الإحداثيات من النص المحفوظ
function parseCoords(str){
    if(!str) return null;
    const m=str.match(/([-\d.]+),\s*([-\d.]+)/);
    return m?[parseFloat(m[1]),parseFloat(m[2])]:null;
}

function ftime(ts){const d=new Date(ts);return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;}

async function loadOrders(){
    const{data}=await sc.from('deliveries').select('*').order('created_at',{ascending:false}).limit(40);
    const list=document.getElementById('ordersList');

    // هل المندوب لديه طلب نشط؟
    const myActive=data?data.find(o=>o.captain_phone===capPhone&&o.status==='تم القبول من المندوب'):null;
    isBusy=!!myActive;
    const pill=document.getElementById('capStatusPill');
    if(isBusy){pill.className='status-pill busy';pill.innerText='🔴 مشغول';}
    else{pill.className='status-pill free';pill.innerText='🟢 متاح';}

    if(!data||data.length===0){list.innerHTML='<div id="noOrders"><span class="empty-icon">📭</span>لا توجد طلبات</div>';return;}

    // لو مشغول: أظهر طلبه فقط، لو فاضي: أظهر الطلبات المنتظرة
    const toShow=isBusy?data.filter(o=>o.captain_phone===capPhone&&o.status==='تم القبول من المندوب'):data.filter(o=>o.status==='قيد الانتظار');

    if(toShow.length===0){
        list.innerHTML='<div id="noOrders"><span class="empty-icon">⏳</span>'+(isBusy?'لا يوجد طلب نشط':'لا توجد طلبات منتظرة الآن')+'</div>';
        return;
    }

    list.innerHTML='';
    toShow.forEach(order=>{
        const isMyOrder=order.captain_phone===capPhone;
        const pickupC=parseCoords(order.pickup_location);
        const dropoffC=parseCoords(order.dropoff_location);

        const card=document.createElement('div');
        card.className='order-card'+(isMyOrder?' my-order':'');
        card.id='card-'+order.id;

        card.innerHTML=`
            <div class="card-top">
                <span class="card-id">طلب #${order.id}</span>
                <span class="badge ${order.status==='قيد الانتظار'?'waiting':order.status==='تم التسليم'?'done':'accepted'}">${order.status}</span>
            </div>

            <!-- خريطة مصغرة -->
            <div class="map-preview" id="map-${order.id}"></div>

            <!-- أزرار الخريطة -->
            <div class="map-actions">
                ${pickupC?`<button class="map-btn pickup" onclick="openNav(${pickupC[0]},${pickupC[1]},'الاستلام')">📍 ملاحة للاستلام</button>`:''}
                ${dropoffC?`<button class="map-btn dropoff" onclick="openNav(${dropoffC[0]},${dropoffC[1]},'التسليم')">🏁 ملاحة للتسليم</button>`:''}
            </div>

            <div class="info-row">
                <div class="info-chip"><span class="lbl">المسافة</span><span class="val">${order.distance} كم</span></div>
                <div class="info-chip"><span class="lbl">الأجرة</span><span class="val">${Number(order.price).toLocaleString()} د.ع</span></div>
            </div>

            <div class="detail-row">📦 <strong>${order.item_details}</strong></div>
            <div class="detail-row">👤 ${order.client_name} &nbsp;|&nbsp; <a href="tel:${order.client_phone}" style="color:#818cf8;">${order.client_phone}</a></div>

            ${!isMyOrder?`<button class="btn-accept" onclick="acceptOrder(${order.id},this)">✅ قبول الطلب</button>`:''}
            ${isMyOrder?`<button class="btn-delivered" onclick="markDelivered(${order.id},this)">✔️ تم التسليم — أنهِ الطلب</button>`:''}

            ${isMyOrder?`
            <div class="chat-box" id="chatbox-${order.id}">
                <div class="chat-hdr"><span class="live-dot"></span>محادثة مع الزبون 💬</div>
                <div class="chat-msgs" id="msgs-${order.id}"><span style="color:#475569;font-size:13px;text-align:center;margin:auto;display:block;">لا توجد رسائل بعد...</span></div>
                <div class="chat-footer">
                    <button type="button" class="send-btn" onclick="sendCapMsg(${order.id})">➤</button>
                    <input type="text" id="cinput-${order.id}" placeholder="اكتب رسالة للزبون..." onkeydown="if(event.key==='Enter')sendCapMsg(${order.id})">
                </div>
            </div>`:''}
        `;
        list.appendChild(card);

        // رسم الخريطة المصغرة
        setTimeout(()=>initMap(order.id,pickupC,dropoffC),100);

        // تشغيل المحادثة
        if(isMyOrder) initCaptainChat(order.id);
    });
}

function initMap(orderId,pickup,dropoff){
    if(maps[orderId]) return;
    const el=document.getElementById('map-'+orderId);
    if(!el) return;
    const center=pickup||dropoff||[33.4208,43.3022];
    const m=L.map(el,{zoomControl:false,attributionControl:false,dragging:false,scrollWheelZoom:false,doubleClickZoom:false,touchZoom:false}).setView(center,13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);

    const pickIcon=L.divIcon({html:'<div style="background:#0ea5e9;width:14px;height:14px;border-radius:50%;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.4);"></div>',iconAnchor:[7,7],className:''});
    const dropIcon=L.divIcon({html:'<div style="background:#f59e0b;width:14px;height:14px;border-radius:50%;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.4);"></div>',iconAnchor:[7,7],className:''});

    const pts=[];
    if(pickup){L.marker(pickup,{icon:pickIcon}).addTo(m).bindTooltip('📍 الاستلام',{permanent:false});pts.push(pickup);}
    if(dropoff){L.marker(dropoff,{icon:dropIcon}).addTo(m).bindTooltip('🏁 التسليم',{permanent:false});pts.push(dropoff);}
    if(pts.length===2) m.fitBounds(pts,{padding:[20,20]});
    maps[orderId]=m;
}

// فتح تطبيق الملاحة (Google Maps أو Waze)
function openNav(lat,lng,label){
    const ua=navigator.userAgent.toLowerCase();
    // على الأجهزة المحمولة: فتح Google Maps بملاحة مباشرة
    const url=`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`;
    window.open(url,'_blank');
}

async function acceptOrder(orderId,btn){
    btn.disabled=true;btn.innerText='⏳ جاري القبول...';
    const{error}=await sc.from('deliveries').update({
        status:'تم القبول من المندوب',
        captain_name:capName,captain_phone:capPhone,captain_bike:capBike
    }).eq('id',orderId);
    if(error){alert('خطأ في القبول!');btn.disabled=false;btn.innerText='✅ قبول الطلب';}
    else loadOrders();
}

async function markDelivered(orderId,btn){
    if(!confirm('هل تأكيد إنهاء الطلب وتسليمه؟')) return;
    btn.disabled=true;btn.innerText='⏳ جاري التأكيد...';
    const{error}=await sc.from('deliveries').update({status:'تم التسليم'}).eq('id',orderId);
    if(error){alert('خطأ!');btn.disabled=false;btn.innerText='✔️ تم التسليم — أنهِ الطلب';}
    else{
        isBusy=false;
        loadOrders();
    }
}

// ===== المحادثة =====
function appendCapMsg(orderId,msg){
    if(!shownMsgIds[orderId]) shownMsgIds[orderId]=new Set();
    if(shownMsgIds[orderId].has(msg.id)) return;
    shownMsgIds[orderId].add(msg.id);
    const box=document.getElementById('msgs-'+orderId);
    if(!box) return;
    const empty=box.querySelector('span');
    if(empty) empty.remove();
    const isMe=msg.sender_role==='captain';
    const div=document.createElement('div');
    div.className='msg '+(isMe?'me':'them');
    div.innerHTML=`${msg.message}<div class="t">${ftime(msg.created_at)}</div>`;
    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
}

async function initCaptainChat(orderId){
    if(chatChannels[orderId]) return;
    const{data}=await sc.from('chat_messages').select('*').eq('order_id',orderId).order('created_at',{ascending:true});
    if(data) data.forEach(m=>appendCapMsg(orderId,m));
    chatChannels[orderId]=sc.channel('cap-chat-'+orderId)
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'chat_messages',filter:`order_id=eq.${orderId}`},(p)=>{
            appendCapMsg(orderId,p.new);
        }).subscribe();
}

async function sendCapMsg(orderId){
    const input=document.getElementById('cinput-'+orderId);
    const text=input.value.trim();
    if(!text) return;
    input.value='';
    const{error}=await sc.from('chat_messages').insert([{order_id:orderId,sender_role:'captain',sender_name:capName,message:text}]);
    if(error){console.error(error);input.value=text;}
}
</script>
</body>
</html>
